<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Consultation — Hawaii Wellness Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ocean:       #1b4f6e;
    --ocean-dark:  #0d2f42;
    --ocean-light: #2e7da6;
    --teal:        #3aaea0;
    --teal-light:  #a8d8d3;
    --coral:       #e07a5f;
    --coral-light: #f2c4b8;
    --sand:        #f5ede0;
    --sand-dark:   #e8d9c4;
    --white:       #fdfcfa;
    --text:        #1a2e24;
    --muted:       #5a7a6a;
    --border:      rgba(58,174,160,0.18);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--text);
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 10px 48px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(58,174,160,0.15);
    box-shadow: 0 2px 20px rgba(27,79,110,0.08);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 120px 64px 60px;
    text-align: center;
    background: linear-gradient(135deg, var(--ocean-dark), var(--ocean));
    position: relative;
  }
  .page-header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(to bottom, transparent, var(--white));
  }
  .page-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 4vw, 3.4rem);
    font-weight: 400; line-height: 1.15;
    color: white; letter-spacing: -0.01em;
    margin-bottom: 16px;
    position: relative; z-index: 1;
  }
  .page-header h1 em { font-style: italic; color: var(--teal-light); }
  .page-header p {
    font-size: 1rem; line-height: 1.75;
    color: rgba(255,255,255,0.7); max-width: 520px; margin: 0 auto;
    position: relative; z-index: 1;
  }

  /* ── MAIN CONTENT ── */
  .booking-content {
    max-width: 720px; margin: 0 auto;
    padding: 40px 32px 80px;
  }

  /* ── GHL FORM EMBED ── */
  .ghl-form-container {
    min-height: 850px;
    width: 100%;
  }

  /* ── FOOTER ── */
  footer {
    background: var(--ocean-dark);
    padding: 40px 64px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;
  }
  .footer-copy { font-size: 0.7rem; color: rgba(168,216,211,0.4); letter-spacing: 0.06em; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .page-header h1, .page-header p { animation: fadeUp 0.7s ease forwards; opacity: 0; }
  .page-header p { animation-delay: 0.15s; }
  .booking-content { animation: fadeUp 0.6s ease 0.25s forwards; opacity: 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 960px) {
    nav { padding: 14px 20px; }
    .page-header { padding: 100px 24px 48px; }
    .booking-content { padding: 32px 20px 60px; }
    footer { padding: 28px 24px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo">
    <img src="/mental-health/logo.png" alt="Hawaii Wellness Clinic" style="height: 56px; width: auto;">
  </a>
</nav>

<!-- HEADER -->
<div class="page-header">
  <h1>Book Your <em>Consultation</em></h1>
  <p>Choose your service, pick a time that works, and our care team will confirm your appointment within 24 hours.</p>
</div>

<!-- BOOKING CONTENT -->
<div class="booking-content">

  <!-- GHL Form Embed -->
  <div class="ghl-form-container">
    <iframe
      src="https://api.leadconnectorhq.com/widget/form/YTmOGFzuBxKThJA0bnz3"
      style="width:100%;height:100%;border:none;border-radius:3px"
      id="inline-YTmOGFzuBxKThJA0bnz3"
      data-layout="{'id':'INLINE'}"
      data-trigger-type="alwaysShow"
      data-trigger-value=""
      data-activation-type="alwaysActivated"
      data-activation-value=""
      data-deactivation-type="neverDeactivate"
      data-deactivation-value=""
      data-form-name="Social Media Landing Pages"
      data-height="807"
      data-layout-iframe-id="inline-YTmOGFzuBxKThJA0bnz3"
      data-form-id="YTmOGFzuBxKThJA0bnz3"
      title="Social Media Landing Pages">
    </iframe>
    <script src="https://link.msgsndr.com/js/form_embed.js"></script>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <div>
    <img src="/mental-health/logo.png" alt="Hawaii Wellness Clinic" style="height: 80px; width: auto; filter: brightness(0) invert(1);">
  </div>
  <div class="footer-copy">&copy; 2025 Hawaii Wellness Clinic. All rights reserved.</div>
</footer>

</body>
</html>
